<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Secret</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1535, #0b1020, #020617);
            height: 100vh;
            width: 100vw;
        }

        /* FLOATING AUDIO CONTROLLER */
        #audioControlContainer {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .audio-fab {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            border: none;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .audio-fab:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.6);
        }

        /* INTRO */
        #intro {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            z-index: 999;
        }

        #intro h1 {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            text-align: center;
        }

        /* MAIN */
        #secretPage {
            display: none;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        /* FLOATING HEARTS */
        .heart {
            position: absolute;
            font-size: 20px;
            opacity: .2;
            animation: floatHeart linear infinite;
            pointer-events: none;
        }

        @keyframes floatHeart {
            from { transform: translateY(100vh); opacity: 0; }
            50% { opacity: .4; }
            to { transform: translateY(-100px); opacity: 0; }
        }

        /* LOCK */
        .lock {
            font-size: 4.5rem;
            margin-bottom: 10px;
        }

        /* CARD */
        .secret-card {
            width: min(750px, 95%);
            padding: 40px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            max-height: 85vh;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        /* Minimal scrollbar design */
        .secret-card::-webkit-scrollbar {
            width: 6px;
        }
        .secret-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .secret-card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .secret-card h1 {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .secret-card p {
            color: #cbd5e1;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        /* BUTTONS */
        .open-btn {
            margin-top: 25px;
            padding: 16px 38px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            transition: .4s;
            font-size: 1rem;
        }

        .open-btn:hover {
            transform: translateY(-3px) scale(1.03);
        }

        /* MESSAGE CONTAINER */
        #messageContainer {
            width: 100%;
            margin-top: 15px;
        }

        /* Smooth paragraph fade-in */
        .secret-paragraph {
            color: white;
            line-height: 1.8;
            font-size: 1.2rem;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
        }

        .secret-paragraph.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* GIFT SECTION */
        #giftSection {
            display: none;
            margin-top: 15px;
            text-align: center;
            width: 100%;
        }

        .gift-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }

        .gift-text {
            color: #cbd5e1;
            line-height: 1.6;
            max-width: 600px;
            margin: auto;
            font-size: 1rem;
        }

        /* Choice container */
        .choice-buttons {
            position: relative;
            margin-top: 25px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        #yesBtn, #noBtn {
            padding: 14px 35px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: white;
            font-size: 0.95rem;
            transition: transform 0.2s ease, opacity 0.4s;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            z-index: 2;
        }

        #noBtn {
            background: rgba(255, 255, 255, .15);
            z-index: 2;
        }

        /* HEARTBEAT */
        .big-heart {
            font-size: 3rem;
            margin-top: 25px;
            animation: beat 1.2s infinite;
            flex-shrink: 0;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

    <audio id="secretMusic" loop></audio>

    <div id="audioControlContainer">
        <button id="audioFab" class="audio-fab" title="Toggle Music">⏸️</button>
    </div>

    <div id="intro">
        <h1>One Last Secret...</h1>
    </div>

    <div id="secretPage">
        <div class="secret-card" id="cardContainer">
            <div class="lock" id="mainLock">🔐</div>
            <h1 id="mainTitle">A Little Secret</h1>
            <p id="subTitle">There's something I wanted to tell you...</p>

            <button class="open-btn" id="openSecret">💜 Open Secret</button>

            <div id="messageContainer"></div>

            <div id="giftSection">
                <h2 class="gift-title">🎁 One More Thing...</h2>
                <p class="gift-text">
                    Your birthday gift is waiting for you 🎀<br>
                    But before that...<br>
                    Would you give me 30 minutes of your birthday so we can celebrate together? ✨
                </p>
                <div class="choice-buttons">
                    <button id="yesBtn">💜 YES</button>
                    <button id="noBtn">🙈 NO</button>
                </div>
            </div>

            <div class="big-heart">💖</div>
        </div>
    </div>

    <script>
        /* AUDIO CONTROLLER HANDSHAKE ARCHITECTURE */
        const audioTrack = document.getElementById("secretMusic");
        const audioFabBtn = document.getElementById("audioFab");

        audioTrack.volume = 0.75;
        
        // Match the song layout track assigned in the prior wish1.html step
        audioTrack.src = "Assets/songs/Thousand_year.mp3";

        // Keep authorization alive continuously
        if (localStorage.getItem("playMusic") === "true") {
            audioTrack.play().catch(err => console.log("Autoplay initialization preserved:", err));
        }

        // Toggle Play/Pause state
        audioFabBtn.addEventListener("click", () => {
            if (audioTrack.paused) {
                audioTrack.play();
                audioFabBtn.innerText = "⏸️";
            } else {
                audioTrack.pause();
                audioFabBtn.innerText = "🎵";
            }
        });

        const cardContainer = document.getElementById("cardContainer");

        /* INTRO SCREEN */
        setTimeout(() => {
            gsap.to("#intro", {
                opacity: 0,
                duration: 1.5,
                onComplete: () => {
                    document.getElementById("intro").style.display = "none";
                    document.getElementById("secretPage").style.display = "flex";
                    gsap.from(".secret-card", {
                        scale: .8,
                        opacity: 0,
                        duration: 1.5
                    });
                }
            });
        }, 3000);

        /* BACKGROUND HEARTS */
        for (let i = 0; i < 40; i++) {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💜";
            heart.style.left = Math.random() * 100 + "%";
            heart.style.animationDuration = (8 + Math.random() * 10) + "s";
            document.body.appendChild(heart);
        }

        /* PARAGRAPH ARRAY DATA */
        const paragraphs = [
            "You know... Out of all the people I've met, you're one of the easiest people to appreciate. Not because you're perfect. But because you're genuinely you.",
            "Your smile, your kindness, your energy, your little habits... they make people happier than you realize.",
            "And honestly? I just wanted you to know that. No matter where life takes you, I hope you always remember how special you are. And how much you deserve to be happy.",
            "Happy Birthday 💜"
        ];

        /* TIMED PARAGRAPH CONTROLLER */
        document.getElementById("openSecret").addEventListener("click", () => {
            document.getElementById("openSecret").style.display = "none";
            document.getElementById("subTitle").style.display = "none";
            
            const container = document.getElementById("messageContainer");
            let pIndex = 0;

            function showNextParagraph() {
                if (pIndex < paragraphs.length) {
                    const p = document.createElement("p");
                    p.className = "secret-paragraph";
                    p.innerText = paragraphs[pIndex];
                    container.appendChild(p);

                    setTimeout(() => {
                        p.classList.add("show");
                        cardContainer.scrollTop = cardContainer.scrollHeight;
                    }, 50);

                    pIndex++;
                    
                    setTimeout(showNextParagraph, 6500);
                } else {
                    gsap.to(["#mainTitle", "#mainLock"], {
                        opacity: 0,
                        scale: 0,
                        height: 0,
                        marginBottom: 0,
                        marginTop: 0,
                        duration: 0.6,
                        onComplete: () => {
                            document.getElementById("mainTitle").style.display = "none";
                            document.getElementById("mainLock").style.display = "none";
                            
                            document.getElementById("giftSection").style.display = "block";
                            gsap.fromTo("#giftSection", 
                                { opacity: 0, y: 30 },
                                { opacity: 1, y: 0, duration: 1, onComplete: () => {
                                    cardContainer.scrollTop = cardContainer.scrollHeight;
                                }}
                            );
                        }
                    });
                }
            }
            showNextParagraph();
        });

        /* RUNAWAY NO BUTTON */
        let noCount = 0;
        const noBtn = document.getElementById("noBtn");

        noBtn.addEventListener("click", () => {
            noCount++;
            if (noCount < 3) {
                noBtn.style.position = "absolute"; 
                const randomX = Math.random() * 180 - 90; 
                const randomY = Math.random() * 40 - 20;
                noBtn.style.transform = `translate(${randomX}px, ${randomY}px) scale(${1 - noCount * 0.2})`;
            } else {
                alert("Okay okay 😭💜\nI think that's enough chances.");
                gsap.to("#noBtn", {
                    scale: 0,
                    opacity: 0,
                    duration: .5,
                    onComplete: () => { noBtn.remove(); }
                });
            }
        });

        /* YES BUTTON REDIRECT */
        document.getElementById("yesBtn").addEventListener("click", () => {
            // Carry music state smoothly into the final thankyou.html page context
            localStorage.setItem("playMusic", "true");

            gsap.to("#secretPage", {
                opacity: 0,
                duration: 1,
                onComplete: () => {
                    window.location.href = "thankyou1.html";
                }
            });
        });
    </script>
</body>
</html>
