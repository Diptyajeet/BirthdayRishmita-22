<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* =======================================
   MINIMALIST START OVERLAY (CSS)
   ======================================= */
#startOverlay {
    position: fixed;
    inset: 0;
    background: #020617;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 1s ease, visibility 1s ease;
}

#startOverlayBtn {
    background: transparent;
    color: white;
    border: 3px solid rgba(255, 255, 255, 0.25);
    
    /* MASSIVE SIZE UPGRADE */
    padding: 30px 85px; 
    font-size: 2rem; 
    letter-spacing: 8px; 
    border-radius: 120px; 
    
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(139, 92, 246, 0.1);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: pulseGlow 2s infinite alternate;
}

#startOverlayBtn:hover {
    background: #1e1135; 
    color: #f472b6; 
    border-color: #ec4899; 
    
    /* Huge glowing footprint for the bigger button */
    box-shadow: 0 0 60px rgba(236, 72, 153, 0.6), 
                0 0 120px rgba(139, 92, 246, 0.4),
                inset 0 0 30px rgba(236, 72, 153, 0.3);
    
    transform: scale(1.05); 
}

@keyframes pulseGlow {
    from { box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); border-color: rgba(255, 255, 255, 0.2); }
    to { box-shadow: 0 0 40px rgba(236, 72, 153, 0.4); border-color: rgba(236, 72, 153, 0.6); }
}

/* =======================================
   LOADER & SPARKLE MAGICAL PULSE
   ======================================= */
#loadingSparkle {
    display: inline-block;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
    animation: magicPulse 2s infinite alternate ease-in-out;
}

@keyframes magicPulse {
    0% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4));
    }
    100% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)) brightness(1.2);
    }
}

/* =======================================
   EXISTING CORE LAYOUT STYLES
   ======================================= */
#mainContent{
    display:none;
    position:relative;
    height:100vh;
    overflow:hidden;
    justify-content:center;
    align-items:center;
    background: 
  radial-gradient(circle at 80% 20%, rgba(123, 97, 255, 0.5), transparent 50%),
  radial-gradient(circle at 15% 85%, rgba(0, 240, 255, 0.4), transparent 50%),
  radial-gradient(circle at 50% 50%, rgba(255, 112, 155, 0.3), transparent 60%),
  #0b0d19; 
}

#introSequencer {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    pointer-events: none;
    padding: 20px;
}

.sequence-text {
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4rem);
    text-align: center;
    opacity: 0;
    position: absolute;
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
}

.hero-card{
    position: relative;
    text-align: center;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 20px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);
    border-radius:40px;
    padding:80px;
    opacity: 0; 
    transform: scale(0.9);
}
.hero-card::before{
    content:"";
    position:relative;
    width:500px;
    height:500px;
    left:50%;
    top:50%;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(139,92,246,.25), transparent 70%);
    filter:blur(120px);
    z-index:-1;
}

/* Sized up and formatted to perfectly scale with the design text */
.intro-line { 
    color: #cbd5e1; 
    margin-bottom: 20px; 
    font-size: 1.6rem; 
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase; 
}
.birthday-title{ color:white; font-size: clamp(4rem,10vw,8rem); font-family: 'Playfair Display',serif; }
.name-title{ margin-top:15px; color:#ec4899; font-size: clamp(3rem,7vw,5.5rem); text-shadow: 0 0 20px rgba(236, 72, 153, 0.3); font-weight: 700; }

/* Combined your duplicate classes into one clean rule */
.hero-subtitle { 
    margin-top: 30px; 
    color: #cbd5e1; 
    font-size: 1.6rem; 
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    letter-spacing: 2px;
    opacity: .9; 
}

.hero-buttons button {
    min-width: 200px; 
    padding: 16px 32px; 
    margin: 12px;
    
    font-family: 'Poppins', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #ec4899, #8b5cf6);
    
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.2);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.hero-buttons button:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4),
                0 0 15px rgba(139, 92, 246, 0.2);
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
    background:
    radial-gradient(circle at top left,#8b5cf620 0%,transparent 30%),
    radial-gradient(circle at bottom right,#ec489920 0%,transparent 30%),
    radial-gradient(circle at center,#312e81 0%,#0f172a 60%,#020617 100%);
}

#loader{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 50%, #020617 100%);
    overflow:hidden;
}

.stars{ position:absolute; inset:0; overflow:hidden; }
.star{ position:absolute; width:2px; height:2px; background:white; border-radius:50%; animation: twinkle infinite alternate; }
@keyframes twinkle{ from{ opacity:.2; } to{ opacity:1; } }
#birthdayStars { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.hero-card { position: relative; z-index: 10; }

.loader-card{
    width:min(600px,90%);
    text-align:center;
    padding:50px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    box-shadow: 0 0 50px rgba(139,92,246,.2);
    z-index:10;
}
.logo{ font-size:4rem; margin-bottom:20px; }
h1{ color:white; font-size:clamp(2rem,5vw,3.2rem); font-family:'Playfair Display',serif; margin-bottom:15px; }
.subtitle{ color:rgba(255,255,255,.7); margin-bottom:35px; letter-spacing:1px; }
.progress-container{ width:100%; height:8px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
.progress-bar{ width:0%; height:100%; border-radius:999px; background: linear-gradient(90deg, #ec4899, #8b5cf6); }
.status{ margin-top:25px; color:white; font-size:1rem; min-height:24px; }

.orb{ position:absolute; border-radius:50%; filter:blur(100px); }
.orb1{ width:300px; height:300px; background:#8b5cf6; top:-100px; left:-100px; }
.orb2{ width:250px; height:250px; background:#ec4899; bottom:-100px; right:-100px; }
.orb3{ width:200px; height:200px; background:#3b82f6; top:50%; left:20%; }
</style>
</head>

<body>

<div id="startOverlay">
    <button id="startOverlayBtn">Please click ✨</button>
</div>

<audio id="bgMusic" loop>
    <source src="Gacabe & Jecabe - Interstellar (Main Theme Piano)-[AudioTrimmer.com].mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<div id="loader">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="stars" id="stars"></div>
    <div class="loader-card">
        <div class="logo" id="loadingSparkle">✨</div>
        <h1>Preparing Something Special</h1>
        <p class="subtitle">A little journey is about to begin...</p>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="status" id="status">Gathering Memories...</div>
    </div>
</div>

<div id="mainContent">
    <div class="stars" id="birthdayStars"></div>

    <div id="introSequencer">
        <div class="sequence-text" id="seq1">Today...</div>
        <div class="sequence-text" id="seq2">Today isn't just another day...</div>
        <div class="sequence-text" id="seq3">Because today...</div>
        <div class="sequence-text" id="seq4">Someone very special<br>came into this world.</div>
    </div>

    <div class="hero-card" id="birthdayCard">
        <p class="intro-line">Today isn't just another day...</p>
        <h1 class="birthday-title">Happy Birthday</h1>
        <h2 class="name-title">RISHMITA 🩷</h2>
        <p class="hero-subtitle">You make ordinary moments special.</p>
        <div class="hero-buttons">
            <button id="musicBtn">⏸️ Pause Music</button>
            <button id="journeyBtn">✨ Begin Journey</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
/* =======================================
   START ENGINE: MUSIC AND INITIALIZATION
   ======================================= */
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");
const overlay = document.getElementById("startOverlay");
const overlayBtn = document.getElementById("startOverlayBtn");

music.volume = 0.8;

overlayBtn.addEventListener("click", () => {
    music.play().catch(err => console.log("Audio boot stalled:", err));
    
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.style.display = "none";
        startLoadingSequence();
    }, 1000);
});

musicBtn.addEventListener("click", (e) => {
    e.stopPropagation(); 
    if (music.paused) {
        music.play();
        musicBtn.innerHTML = "⏸️ Pause Music";
    } else {
        music.pause();
        musicBtn.innerHTML = "🎵 Continue Music";
    }
});

/* =======================================
   CREATE LOGICAL STARS IN BACKGROUNDS
   ======================================= */
const starsContainer = document.getElementById("stars");
for(let i=0; i<150; i++){
    const star = document.createElement("div");
    star.classList.add("star");
    star.style.left = Math.random()*100+"%";
    star.style.top = Math.random()*100+"%";
    star.style.animationDuration = (Math.random()*3+1)+"s";
    star.style.opacity = Math.random();
    starsContainer.appendChild(star);
}

/* =======================================
   PROGRESS LOADER PARAMETERS
   ======================================= */
const messages = [
    "Gathering Memories...",
    "Collecting Special Moments...",
    "Wrapping Birthday Wishes...",
    "Adding A Little Magic...",
    "Almost Ready..."
];

let index = 0;
const status = document.getElementById("status");
let interval;

// GSAP intro for loader card UI elements
gsap.from(".loader-card",{ opacity:0, scale:.8, duration:1.2, ease:"power3.out" });

// BURST POP OUT EFFECT FOR SPARKLE
gsap.from("#loadingSparkle", {
    scale: 0,
    duration: 1.1,
    ease: "back.out(2.5)"
});

function startLoadingSequence() {
    interval = setInterval(()=>{
        index++;
        if(index < messages.length){
            status.textContent = messages[index];
        }
    }, 1000);

    gsap.to(".progress-bar",{
        width:"100%",
        duration:5,
        ease:"power2.out"
    });

    setTimeout(() => {
        clearInterval(interval);
        document.body.style.backgroundColor = "#020617";

        gsap.to("#loader", {
            opacity: 0,
            scale: 1.05,
            duration: 1.5,
            ease: "power2.inOut",
            onComplete: () => {
                document.getElementById("loader").style.display = "none";
                const content = document.getElementById("mainContent");
                content.style.display = "flex";

                const birthdayStarsContainer = document.getElementById("birthdayStars");
                for (let i = 0; i < 150; i++) {
                    const star = document.createElement("div");
                    star.classList.add("star");
                    star.style.left = Math.random() * 100 + "%";
                    star.style.top = Math.random() * 100 + "%";
                    star.style.animationDuration = (Math.random() * 3 + 1) + "s";
                    star.style.opacity = Math.random();
                    birthdayStarsContainer.appendChild(star);
                }

                // Sequence layout reveals
                const seqTL = gsap.timeline({
                    onComplete: () => {
                        document.getElementById("introSequencer").style.display = "none";
                        revealBirthdayCard();
                    }
                });

                seqTL.to("#seq1", { opacity: 1, y: -10, duration: 1.2, ease: "power2.out" })
                     .to("#seq1", { opacity: 0, y: -20, duration: 0.8, ease: "power2.in" }, "+=1.0");

                seqTL.to("#seq2", { opacity: 1, y: -10, duration: 1.2, ease: "power2.out" })
                     .to("#seq2", { opacity: 0, y: -20, duration: 0.8, ease: "power2.in" }, "+=1.2");

                seqTL.to("#seq3", { opacity: 1, y: -10, duration: 1.2, ease: "power2.out" })
                     .to("#seq3", { opacity: 0, y: -20, duration: 0.8, ease: "power2.in" }, "+=1.0");

                seqTL.to("#seq4", { opacity: 1, scale: 1.05, duration: 1.5, ease: "power2.out" })
                     .to("#seq4", { opacity: 0, scale: 1.1, duration: 1.0, ease: "power2.in" }, "+=1.5");
            }
        });
    }, 5500);
}

function revealBirthdayCard() {
    gsap.to("#birthdayCard", { opacity: 1, scale: 1, duration: 1.5, ease: "power4.out" });
    gsap.from(".intro-line", { y: -30, opacity: 0, duration: 1.2, ease: "power3.out" });
    gsap.from(".birthday-title", { y: 30, opacity: 0, duration: 1.5, delay: 0.3, ease: "power3.out" });
    gsap.from(".name-title", { scale: 0.8, opacity: 0, duration: 1.8, delay: 0.6, ease: "back.out(1.5)" });
    gsap.from(".hero-subtitle", { opacity: 0, y: 20, duration: 1, delay: 1.2 });
    gsap.from(".hero-buttons", { opacity: 0, y: 20, duration: 1, delay: 1.5 });
}
document
.getElementById("journeyBtn")
.addEventListener("click", () => {

    gsap.to(".hero-card",{
        opacity:0,
        scale:.9,
        duration:1
    });

    setTimeout(()=>{

        window.location.href =
        "special1.html";

    },1200);

});
</script>
<script src="script.js"></script>

</body>
</html>
